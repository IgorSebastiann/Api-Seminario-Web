spring.application.name=seminario-backend

# Alterando a porta para evitar conflito com a 8080
server.port=8081

# Configurações do H2 Database (Banco em memória)
spring.datasource.url=jdbc:h2:mem:seminariodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuração do Spring Data JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Habilitar console do H2 no navegador (http://localhost:8081/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
